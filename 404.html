<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Passphrase</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
            text-align:center;
        }

        .error-box{
            padding:40px;
        }

        h1{
            font-size:80px;
            color:#dc3545;
            margin-bottom:10px;
        }

        h2{
            font-size:28px;
            margin-bottom:15px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        a{
            display:inline-block;
            padding:12px 25px;
            background:#007bff;
            color:#fff;
            text-decoration:none;
            border-radius:5px;
        }

        a:hover{
            opacity:.9;
        }
    </style>
</head>
<body>

    <div class="error-box">
        <h1>404</h1>
        <h2>Invalid Passphrase</h2>
        <p>Please try again!</p>
        <a href="/wallet.html">Retry</a>
    </div>

</body>
</html>
